name: query-analyzer

services:
  # ============================================================================
  # SQL DATABASES
  # ============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: query-analyzer-postgres
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER:-qa}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:-QAnalyze}
      POSTGRES_DB: ${DB_POSTGRES_NAME:-query_analyzer}
    ports:
      - "${DB_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_POSTGRES_USER:-qa}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - type: bind
        source: ${PWD}/docker/init/01-init-postgres-users.sql
        target: /docker-entrypoint-initdb.d/01-init-users.sql
        read_only: true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - query-analyzer-net

  mysql:
    image: mysql:8
    container_name: query-analyzer-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_MYSQL_PASSWORD:-QAnalyze}
      MYSQL_DATABASE: ${DB_MYSQL_NAME:-query_analyzer}
      MYSQL_USER: ${DB_MYSQL_USER:-qa}
      MYSQL_PASSWORD: ${DB_MYSQL_PASSWORD:-QAnalyze}
    ports:
      - "${DB_MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - type: bind
        source: ${PWD}/docker/init/01-init-mysql-users.sql
        target: /docker-entrypoint-initdb.d/01-init-users.sql
        read_only: true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - query-analyzer-net

  # ============================================================================
  # NoSQL / CACHE
  # ============================================================================

  mongodb:
    image: mongo:7
    container_name: query-analyzer-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_MONGODB_PASSWORD:-mongodb123}
      MONGO_INITDB_DATABASE: ${DB_MONGODB_NAME:-query_analyzer}
    ports:
      - "${DB_MONGODB_PORT:-27017}:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - query-analyzer-net

  redis:
    image: redis:7-alpine
    container_name: query-analyzer-redis
    ports:
      - "${DB_REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    networks:
      - query-analyzer-net

  # ============================================================================
  # TIME-SERIES / GRAPH
  # ============================================================================

  influxdb:
    image: influxdb:2-alpine
    container_name: query-analyzer-influxdb
    environment:
      # InfluxDB 2.x initialization
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${DB_INFLUXDB_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${DB_INFLUXDB_PASSWORD:-influxdb123}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${DB_INFLUXDB_TOKEN:-mytoken}
      DOCKER_INFLUXDB_INIT_ORG: ${DB_INFLUXDB_ORG:-myorg}
      DOCKER_INFLUXDB_INIT_BUCKET: ${DB_INFLUXDB_NAME:-query_analyzer}
      DOCKER_INFLUXDB_INIT_RETENTION: ${DB_INFLUXDB_RETENTION:-720h}
    ports:
      - "${DB_INFLUXDB_PORT:-8086}:8086"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - query-analyzer-net

  neo4j:
    image: neo4j:5
    container_name: query-analyzer-neo4j
    environment:
      NEO4J_AUTH: ${DB_NEO4J_USER:-neo4j}/${DB_NEO4J_PASSWORD:-neo4j123}
      NEO4J_server_memory_heap_initial__size: 128M
      NEO4J_server_memory_heap_max__size: 256M
      NEO4J_server_memory_pagecache_size: 128M
      NEO4J_dbms_memory_transaction_total_max: 256M
    ports:
      - "${DB_NEO4J_BOLT_PORT:-7687}:7687"
      - "${DB_NEO4J_HTTP_PORT:-7474}:7474"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474/"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - query-analyzer-net

  cockroachdb:
    image: cockroachdb/cockroach:latest
    container_name: query-analyzer-cockroachdb
    ports:
      - "${DB_COCKROACH_PORT:-26257}:26257"
      - "${DB_COCKROACH_HTTP_PORT:-8080}:8080"
    command: start-single-node --insecure
    environment:
      COCKROACH_SKIP_ENABLING_DIAGNOSTIC_REPORTING: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1024M
    networks:
      - query-analyzer-net

  yugabytedb:
    image: yugabytedb/yugabyte:latest
    container_name: query-analyzer-yugabytedb
    ports:
      - "${DB_YUGABYTE_PORT:-5433}:5433"
      - "${DB_YUGABYTE_UI_PORT:-7000}:7000"
    command: >
      bin/yugabyted start --daemon=false
    environment:
      YSQL_PASSWORD: yugabyte
    healthcheck:
      test: ["CMD", "bash", "-c", "PGPASSWORD=yugabyte bin/ysqlsh -h yugabytedb -p 5433 -U yugabyte -d yugabyte -c 'SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1024M
    networks:
      - query-analyzer-net

  # ============================================================================
  # SEARCH ENGINES
  # ============================================================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: query-analyzer-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${ES_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1024M
    networks:
      - query-analyzer-net

  # ============================================================================
  # MICROSOFT SQL SERVER
  # ============================================================================

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: query-analyzer-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_MSSQL_PASSWORD:-YourPassword123!}
      MSSQL_PID: Developer
    ports:
      - "${DB_MSSQL_PORT:-1433}:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P ${DB_MSSQL_PASSWORD:-YourPassword123!} -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2048M
    networks:
      - query-analyzer-net

networks:
  query-analyzer-net:
    driver: bridge
