name: Release on Version Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: 1

jobs:
  build-package:
    name: Build Python package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Build wheel and sdist
        run: uv build

      - name: Upload Python package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  build-binaries:
    name: Build executable (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-x64
            output_name: qa-linux-x64
            output_path: dist/qa
          - os: macos-latest
            target_name: macos-arm64
            output_name: qa-macos-arm64
            output_path: dist/qa
          - os: windows-latest
            target_name: windows-x64
            output_name: qa-windows-x64.exe
            output_path: dist/qa.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install --system pyinstaller

      - name: Build single-file executable
        run: pyinstaller --onefile --name qa query_analyzer/__main__.py

      - name: Copy executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cp "${{ matrix.output_path }}" "${{ matrix.output_name }}"
          chmod +x "${{ matrix.output_name }}"

      - name: Copy executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "${{ matrix.output_path }}" "${{ matrix.output_name }}"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: executable-${{ matrix.target_name }}
          path: ${{ matrix.output_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-package
      - build-binaries

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release assets folder
        run: |
          mkdir -p upload
          find release-assets -type f -exec cp {} upload/ \;

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
          generate_release_notes: true
          draft: false
          prerelease: false
